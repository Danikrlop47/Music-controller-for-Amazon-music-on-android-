<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>Amazon Music Controller · Even G2</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121212;
        --surface: #1e1e1e;
        --surface-2: #282828;
        --border: #333;
        --text: #f5f5f5;
        --muted: #a3a3a3;
        --accent: #1db954;
        --accent-dim: rgba(29, 185, 84, 0.15);
        --danger: #ef4444;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
      }

      #app {
        min-height: 100%;
        padding: 24px 16px 48px;
      }

      .shell {
        max-width: 480px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      header h1 {
        margin: 4px 0 8px;
        font-size: 1.5rem;
        font-weight: 650;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .now-playing {
        display: grid;
        gap: 12px;
        text-align: center;
        padding: 8px 0;
      }

      .artwork {
        width: 160px;
        height: 160px;
        margin: 0 auto;
        border-radius: 12px;
        background: linear-gradient(135deg, #232323, #1a1a1a);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
      }

      .track-title {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 650;
        line-height: 1.3;
      }

      .track-artist {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .track-album {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .progress-wrap {
        display: grid;
        gap: 6px;
      }

      .progress-bar {
        height: 4px;
        background: var(--surface-2);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        transition: width 0.3s ease;
      }

      .progress-times {
        display: flex;
        justify-content: space-between;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .play-state {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .play-state.playing {
        background: var(--accent-dim);
        color: var(--accent);
      }

      .play-state.paused {
        background: rgba(163, 163, 163, 0.12);
        color: var(--muted);
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-top: 4px;
      }

      .ctrl-btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ctrl-btn:hover { background: #333; }

      .ctrl-btn.primary {
        width: 64px;
        height: 64px;
        background: var(--accent);
        border-color: var(--accent);
        color: #000;
        font-size: 1.5rem;
      }

      .ctrl-btn.primary:hover {
        background: #1ed760;
      }

      .mode-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .mode-btn {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        cursor: pointer;
        font-weight: 600;
      }

      .mode-btn.active {
        border-color: var(--accent);
        background: var(--accent-dim);
        color: var(--accent);
      }

      .status-line {
        margin: 0;
        font-size: 0.88rem;
        color: var(--muted);
      }

      .status-line.ok { color: var(--accent); }
      .status-line.error { color: var(--danger); }
      .status-line.loading { color: #93c5fd; }

      .hints ul {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .hints li + li { margin-top: 6px; }

      .demo-tracks {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 6px;
      }

      .demo-tracks li {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        cursor: pointer;
        font-size: 0.9rem;
      }

      .demo-tracks li.active {
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      .demo-tracks .track-name {
        font-weight: 600;
      }

      .demo-tracks .track-meta {
        color: var(--muted);
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
